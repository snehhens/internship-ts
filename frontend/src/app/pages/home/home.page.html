<ion-header>
  <ion-toolbar>


    <ion-title>
      {{ user?.role === 'brand'
      ? 'Brand Dashboard'
      : 'Campaigns' }}
    </ion-title>

    <ion-buttons slot="end">

      <ion-button
  fill="clear"
  routerLink="/my-profile">

        <ion-icon name="person-circle-outline">
        </ion-icon>

      </ion-button>

      <ion-button fill="clear" color="danger" (click)="logout()">

        Logout

      </ion-button>

    </ion-buttons>


  </ion-toolbar>
</ion-header>

<ion-content class="home-page" [fullscreen]="true">

  <ion-card>

  <ion-card-header>

    <ion-card-title>
      Quick Actions
    </ion-card-title>

  </ion-card-header>

  <ion-card-content>

    <ion-button
      expand="block"
      routerLink="/my-profile">

      My Profile

    </ion-button>

    <ion-button
      expand="block"
      routerLink="/portfolio">

      Portfolio

    </ion-button>

    <ion-button
      expand="block"
      routerLink="/campaigns">

      Campaigns

    </ion-button>

    <ion-button
      *ngIf="user?.role === 'brand'"
      expand="block"
      routerLink="/create-campaign">

      Create Campaign

    </ion-button>

  </ion-card-content>

</ion-card>
