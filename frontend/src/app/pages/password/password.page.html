<ion-content fullscreen>

  <div class="auth-container">

    <div class="auth-card">

      <div class="auth-logo">
        P
      </div>

      <h1 class="auth-title">
        Create Password
      </h1>

      <p class="auth-subtitle">

        Secure your account with
        a strong password

      </p>

      <form [formGroup]="passwordForm">

        <!-- EMAIL -->

        <label class="auth-label">
          Email address
        </label>

        <ion-item
          lines="none"
          class="auth-input">

          <ion-input
            readonly="true"
            formControlName="email">
          </ion-input>

        </ion-item>

        <!-- PASSWORD -->

        <label class="auth-label">
          Password
        </label>

        <ion-item
          lines="none"
          class="auth-input">

          <ion-input
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter password"
            formControlName="password">

          </ion-input>

          <ion-button
            fill="clear"
            slot="end"
            (click)="showPassword = !showPassword">

            <ion-icon
              [name]="
              showPassword
              ? 'eye-off-outline'
              : 'eye-outline'
              ">
            </ion-icon>

          </ion-button>

        </ion-item>

        <p
          class="auth-error"
          *ngIf="
          passwordForm.get('password')?.touched &&
          passwordForm.get('password')?.invalid
          ">

          Password must be at least 6 characters

        </p>

        <!-- CONFIRM PASSWORD -->

        <label class="auth-label">
          Confirm password
        </label>

        <ion-item
          lines="none"
          class="auth-input">

          <ion-input
            [type]="showConfirmPassword ? 'text' : 'password'"
            placeholder="Confirm password"
            formControlName="confirmPassword">

          </ion-input>

          <ion-button
            fill="clear"
            slot="end"
            (click)="
            showConfirmPassword =
            !showConfirmPassword
            ">

            <ion-icon
              [name]="
              showConfirmPassword
              ? 'eye-off-outline'
              : 'eye-outline'
              ">
            </ion-icon>

          </ion-button>

        </ion-item>

        <p
          class="auth-error"
          *ngIf="
          passwordForm.hasError('passwordMismatch') &&
          passwordForm.get('confirmPassword')?.touched
          ">

          Passwords do not match

        </p>

        <!-- BACKEND ERROR -->

        <p
          class="auth-error"
          *ngIf="errorMessage">

          {{ errorMessage }}

        </p>

        <!-- BUTTON -->

        <ion-button
          expand="block"
          class="auth-button"
          [disabled]="loading"
          (click)="createPassword()">

          <ion-spinner
            *ngIf="loading"
            name="crescent">
          </ion-spinner>

          <span *ngIf="!loading">

            Create Password

          </span>

        </ion-button>

      </form>

    </div>

  </div>

</ion-content>
